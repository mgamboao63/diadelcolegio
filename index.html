<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasilia Borderland - Juez</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
body{background:#f4f6f9;font-family:Arial,sans-serif}
#reader{max-width:500px;margin:auto}
#juegoActual{font-size:2rem;font-weight:bold;color:#0d6efd}
</style>
</head>
<body class="container py-4">
<h2 class="text-center">🏆 Brasilia Borderland</h2>

<div class="card p-3 mb-3">
<label class="form-label">Juego</label>
<select id="juego" class="form-select">
<option value="1">Juego 1</option>
<option value="2">Juego 2</option>
<option value="3">Juego 3</option>
<option value="4">Juego 4</option>
<option value="5">Juego 5</option>
<option value="6">Juego 6</option>
<option value="7">Juego 7</option>
<option value="8">Juego 8</option>
<option value="9">Penalización</option>
</select>
<button class="btn btn-primary mt-3" onclick="guardarJuego()">Guardar configuración</button>
<hr>
<div>Juego activo:</div>
<div id="juegoActual">Sin configurar</div>
</div>

<div class="card p-2 mb-3">
<div id="reader"></div>
</div>

<div id="resultado" class="alert d-none"></div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbznLMDClnohAfL04Zy1ejQMikti2DFFfH3srF1Q9_wGj-yaKgegLyqDU_bUeD57_8p3/exec";
let juegoSeleccionado=null;
let bloqueado=false;

window.onload=()=>{
 const j=localStorage.getItem("juego");
 if(j){juegoSeleccionado=j;actualizar();}
 iniciar();
}

function guardarJuego(){
 juegoSeleccionado=document.getElementById("juego").value;
 localStorage.setItem("juego",juegoSeleccionado);
 actualizar();
}

function actualizar(){
 document.getElementById("juegoActual").innerHTML=
 juegoSeleccionado=="9"?"🚨 Penalización":"Juego "+juegoSeleccionado;
}

function iniciar(){
 const scanner=new Html5QrcodeScanner("reader",{fps:10,qrbox:{width:250,height:250}});
 scanner.render(leido);
}

function leido(id){
 if(bloqueado)return;
 if(!juegoSeleccionado){alert("Seleccione un juego.");return;}
 bloqueado=true;

 fetch(API_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{
        "Content-Type":"application/json"
    },
    body:JSON.stringify({
        id:id,
        juego:juegoSeleccionado
    })
})
.then(()=>{
    // Mostrar éxito
})
.catch(()=>{
    // Mostrar error
});
}
</script>
</body>
</html>
