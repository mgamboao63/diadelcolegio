<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Las Cuatro Figuras</title><style>
body{margin:0;background:#fff4f7;color:#2d1020;font-family:Arial}header{background:linear-gradient(120deg,#7f1748,#db2777);color:#fff;padding:22px}.h,main{max-width:1100px;margin:auto}.h{display:flex;justify-content:space-between;align-items:center;gap:12px}main{padding:20px}.card{background:#fff;padding:20px;border-radius:16px;box-shadow:0 7px 22px #83184322;margin-bottom:16px}.hide{display:none!important}button,input,select{padding:11px;border-radius:9px;font-size:1rem}button{border:0;background:#9d174d;color:#fff;font-weight:bold;cursor:pointer}input,select{border:1px solid #bbb;width:100%;box-sizing:border-box;margin:7px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.p{border-left:6px solid var(--c);padding:12px;border-radius:12px;background:#fff}.p img{width:45px;height:45px;object-fit:contain;float:left;margin-right:8px}.p p{clear:both;margin:8px 0 0}.off{opacity:.4;text-decoration:line-through}.figuras{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.figuras button{font-size:1.2rem;padding:20px}.msg{padding:12px;margin-top:12px;background:#fce7f3;border-radius:9px}.ok{background:#dcfce7}.center{max-width:480px;margin:25px auto}.state{background:#fce7f3;padding:8px;border-radius:8px;display:inline-block}.modal{border:3px solid #ec4899;background:#fff0f6;padding:18px;border-radius:14px}.big{font-size:2rem;text-align:center;color:#9d174d}@media(max-width:500px){.h{flex-direction:column;align-items:flex-start}}
</style><header><div class="h"><div><h1>♡ Las Cuatro Figuras</h1><div>Confía, duda o engaña.</div></div><div><button onclick="location.href='cuatro-figuras-control.html'">Juez</button> <button onclick="window.open('cuatro-figuras-vivo.html','vivo')">Videobeam</button></div></div></header><main><section id="jugador" class="hide"><div id="registro" class="card center"><h2>Registro</h2><form onsubmit="reg(event)"><input id="nombre" placeholder="Tu nickname" required><button>Entrar</button></form><div id="mr"></div></div><div id="panel" class="card center hide"></div></section><section id="control" class="hide"><div id="login" class="card center"><form onsubmit="login(event)"><input id="clave" type="password" placeholder="Clave del juez"><button>Ingresar</button></form></div><div id="pc" class="hide"><div class="card"><h2>Control</h2><div id="ec"></div><p><button onclick="accion('iniciar')">Iniciar / siguiente ronda</button> <button onclick="accion('revelar')">Revelar ronda</button> <button onclick="accion('reset')">Reiniciar</button></p><div id="mc"></div></div><div class="card" id="lista"></div></div></section><section id="vivo" class="hide"><div id="pv"></div></section></main><script>
const API='https://script.google.com/macros/s/AKfycbzYewN-nZBINE3LrslKUESYs4VfRfYy9hDoThUNXc1dgTZwbnjRCJCh3gdFst3DOrFq/exec';const A=[['Rayo','rayo.png','#f59e0b'],['Fénix','fenix.png','#ef4444'],['Tigre','tigre.png','#f97316'],['Halcón','halcon.png','#3b82f6'],['Lobo','lobo.png','#64748b'],['Jaguar','jaguar.png','#a16207'],['Cometa','cometa.png','#8b5cf6'],['Titán','titan.png','#0f766e'],['Nébula','nebula.png','#6366f1'],['Vector','vector.png','#06b6d4']];const modo=new URLSearchParams(location.search).get('modo')||'jugador';let d,yo=JSON.parse(localStorage.getItem('cfyo')||'null'),clave=sessionStorage.getItem('cfclave')||'',respuestaInicio=0,respuestaTexto='';const $=x=>document.getElementById(x),E=x=>String(x??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));function post(x){return fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(x)}).then(r=>r.json())}function estado(s){return `<span class="state">${s.estado==='inscripcion'?'Inscripción abierta':s.estado==='cartas'?'Ronda '+s.ronda+': registren carta':s.estado==='respuestas'?'Ronda '+s.ronda+': elijan figura':'Finalizado: '+s.resultado}</span>`}function cards(js){return `<div class="grid">${js.map(x=>{let a=A[x.avatar]||A[0];return `<div class="p ${x.activo?'':'off'}" style="--c:${a[2]}"><img src="${a[1]}"><b>${E(x.nombre)}</b><small> ${a[0]}</small><p>${x.activo?'🃏 '+x.comodines+' comodines':'Eliminado'}</p></div>`}).join('')}</div>`}async function load(){try{let u=API+'?accion=estado';if(yo)u+='&id='+yo.id;d=await (await fetch(u)).json();if(d.error)throw Error(d.mensaje);paint()}catch(e){console.error(e)}}function paint(){let s=d.sesion;if(modo==='jugador'){let p=yo&&d.jugadores.find(x=>x.id===yo.id);$('registro').classList.toggle('hide',!!p||s.estado!=='inscripcion');$('panel').classList.toggle('hide',!p);if(!p)return;let html=estado(s)+`<h2>${E(p.nombre)}</h2><p>🃏 Comodines: ${p.comodines}</p>`;if(s.estado==='cartas'&&p.activo&&!d.yo.registro)html+=`<label>Número de carta (1 a 52)</label><input id="carta" type="number" min="1" max="52"><button onclick="registrarCarta()">Registrar carta</button>`;else if(s.estado==='respuestas'&&p.activo){if(d.consultaRecibida)html+=`<div class="modal"><b>Consulta de otro participante</b><p>La figura es: <strong>${d.consultaRecibida.figura}</strong></p><button onclick="responder('verdad')">Decir verdad</button> <button onclick="responder('falso')">Decir otra</button> <button onclick="responder('nose')">No sé</button><div id="falsa"></div></div>`;if(d.respuestaConsulta){if(d.respuestaConsulta!==respuestaTexto){respuestaTexto=d.respuestaConsulta;respuestaInicio=Date.now()}if(Date.now()-respuestaInicio<3000)html+=`<div class="msg ok">Respuesta recibida: <b>${d.respuestaConsulta}</b><br><small>Se ocultará en unos segundos.</small></div>`}if(!d.yo.registro?.respuesta)html+=`<h3>¿Cuál es tu figura?</h3><div class="figuras">${['Corazones ♥','Tréboles ♣','Diamantes ♦','Picas ♠'].map(x=>`<button onclick="elegir('${x.split(' ')[0]}')">${x}</button>`).join('')}</div>${p.comodines?`<h3>Usar comodín</h3><select id="objetivo"><option value="">Elige participante</option>${d.jugadores.filter(x=>x.id!==p.id&&x.activo).map(x=>`<option value="${x.id}">${E(x.nombre)}</option>`).join('')}</select><button onclick="comodin()">Consultar</button>`:''}`;else html+='<div class="msg">Respuesta enviada. Espera al juez.</div>'}else if(!p.activo)html+='<div class="big">ELIMINADO</div>';else if(s.estado==='final')html+='<div class="big">'+E(s.resultado)+'</div>';else html+='<div class="msg">Espera el siguiente paso del juez.</div>';$('panel').innerHTML=html}if(modo==='control'){if(!clave)return;$('login').classList.add('hide');$('pc').classList.remove('hide');$('ec').innerHTML=estado(s);$('lista').innerHTML='<h2>Participantes</h2>'+cards(d.jugadores)}if(modo==='vivo')$('pv').innerHTML=`<div class="card"><h2>Las Cuatro Figuras</h2>${estado(s)}<h3>Ronda ${s.ronda}</h3>${cards(d.jugadores)}</div>`}async function reg(e){e.preventDefault();let x=await post({accion:'registrar',nombre:$('nombre').value});if(x.error)return $('mr').innerHTML='<div class="msg">'+E(x.mensaje)+'</div>';yo={id:x.id};localStorage.setItem('cfyo',JSON.stringify(yo));load()}async function registrarCarta(){let x=await post({accion:'carta',id:yo.id,carta:$('carta').value});if(x.error)alert(x.mensaje);load()}async function elegir(f){let x=await post({accion:'elegir',id:yo.id,figura:f});if(x.error)alert(x.mensaje);load()}async function comodin(){let x=await post({accion:'comodin',id:yo.id,objetivo:$('objetivo').value});if(x.error)alert(x.mensaje);load()}function responder(m){if(m==='falso'){$('falsa').innerHTML='<select id="ff"><option>Corazones</option><option>Tréboles</option><option>Diamantes</option><option>Picas</option></select><button onclick="enviarRespuestaFalsa()">Enviar figura falsa</button>';return}post({accion:'responder',id:yo.id,modo:m}).then(load)}function enviarRespuestaFalsa(){post({accion:'responder',id:yo.id,modo:'falso',figura:$('ff').value}).then(load)}function login(e){e.preventDefault();clave=$('clave').value;sessionStorage.setItem('cfclave',clave);load()}function accion(a){post({accion:a,clave}).then(x=>{if(x.error)$('mc').innerHTML='<div class="msg">'+E(x.mensaje)+'</div>';if(a==='reset'){yo=null;localStorage.removeItem('cfyo')}load()})}$(''+(modo==='control'?'control':modo==='vivo'?'vivo':'jugador')).classList.remove('hide');load();setInterval(load,2000);
</script>
