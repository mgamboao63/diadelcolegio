<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Código Maestro</title><style>
:root{--r:#b91c1c;--d:#13090b;--o:#fbbf24;--bg:#f5f5f5}*{box-sizing:border-box}body{margin:0;font-family:Arial;background:radial-gradient(circle at top,#3b1017,#11090b 55%);color:#fff;min-height:100vh}header{padding:22px;background:#080405cc;border-bottom:2px solid var(--o)}.head,main{max-width:1150px;margin:auto}.head{display:flex;justify-content:space-between;gap:15px;align-items:center}h1{margin:0;color:var(--o)}main{padding:24px 16px}.card{background:#fff;color:#1f1618;padding:22px;border-radius:16px;box-shadow:0 10px 28px #0007;margin-bottom:18px}.hide{display:none!important}button{border:0;border-radius:9px;padding:11px 15px;background:var(--r);color:#fff;font-weight:bold;cursor:pointer}button:hover{filter:brightness(1.15)}button:disabled{opacity:.45}input{width:100%;padding:13px;border:1px solid #bbb;border-radius:9px;font-size:1rem;margin:7px 0 13px}.nav button{background:#ffffff1f;border:1px solid #ffffff77}.state{display:inline-block;padding:8px 12px;border-radius:8px;font-weight:bold;background:#fee2e2;color:#991b1b}.open{background:#dcfce7;color:#166534}.over{background:#fef3c7;color:#854d0e}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}.team{border-left:6px solid var(--c);background:#fff;border-radius:12px;padding:13px;color:#222}.team img{width:50px;height:50px;object-fit:contain;float:left;margin-right:10px}.team b{display:block}.team small{color:#666}.team p{clear:both;margin:10px 0 0}.winner{outline:3px solid var(--o);background:#fff9e5}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}.msg{margin-top:12px;padding:11px;border-radius:9px;background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}.tries{width:100%;border-collapse:collapse;margin-top:16px}.tries td,.tries th{padding:9px;border-bottom:1px solid #ddd;text-align:left}.gameover{text-align:center;padding:45px 15px;background:linear-gradient(135deg,#21060a,#7f101d);border:3px solid var(--o);border-radius:18px}.gameover h2{font-size:clamp(3rem,12vw,7rem);margin:0;color:var(--o);text-shadow:4px 4px #21060a}.center{max-width:500px;margin:30px auto}.hint{background:#fff3cd;padding:13px;border-radius:9px;color:#664d03}.casillas{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:15px 0}.casilla{background:#f8fafc;color:#111;border:2px solid #94a3b8;border-radius:10px;padding:17px 2px;font-size:1.8rem;text-align:center}.casilla.activa{border-color:var(--r);box-shadow:0 0 0 3px #b91c1c33}.teclado{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.teclado button{font-size:1.25rem;background:#2b1014}.teclado .borrar{background:#6b7280}.enviar{width:100%;margin-top:12px;background:#a16207}@media(max-width:520px){.head{align-items:flex-start;flex-direction:column}}
</style></head><body><header><div class="head"><div><h1>♦ Código Maestro</h1><div>Descubre tu código secreto antes que los demás equipos.</div></div><div class="nav"><button onclick="location.href='codigo-maestro-control.html'">Juez</button><button onclick="window.open('codigo-maestro-vivo.html','vivo')">Videobeam</button></div></div></header><main>
<section id="jugador" class="hide"><div id="registro" class="card center"><h2>Registro de equipo</h2><p>Elijan un nombre para su equipo. Su código será secreto.</p><form onsubmit="registrar(event)"><input id="nombre" maxlength="24" required placeholder="Nombre del equipo"><button>Entrar al desafío</button></form><div id="mreg"></div></div><div id="panel" class="card center hide"></div></section>
<section id="control" class="hide"><div id="login" class="card center"><h2>Control del juez</h2><form onsubmit="entrarControl(event)"><input id="clave" type="password" placeholder="Clave de control" required><button>Ingresar</button></form><div id="mcontrol"></div></div><div id="panelControl" class="hide"><div class="card"><div class="row"><div><h2>Panel de control</h2><div id="estadoControl"></div></div><div><button onclick="abrir()">Iniciar juego</button> <button onclick="resetear()">Reiniciar</button></div></div><div id="maccion"></div></div><div class="card" id="equiposControl"></div></div></section>
<section id="vivo" class="hide"><div id="pantalla"></div></section>
</main><script>
const API_URL='https://script.google.com/macros/s/AKfycbzjmdrKc2qvaQ1ppClGuK5RH1u62cE6whdM_bm1Rvf8wC6pS6t9G6OLzbn5Zawk18Bx/exec';
const AV=[['Rayo','rayo.png','#f59e0b'],['Fénix','fenix.png','#ef4444'],['Tigre','tigre.png','#f97316'],['Halcón','halcon.png','#3b82f6'],['Lobo','lobo.png','#64748b'],['Jaguar','jaguar.png','#a16207'],['Cometa','cometa.png','#8b5cf6'],['Titán','titan.png','#0f766e'],['Nébula','nebula.png','#6366f1'],['Vector','vector.png','#06b6d4']];
const modo=new URLSearchParams(location.search).get('modo')||'jugador';let data=null,control=sessionStorage.getItem('cmcontrol')||'',local=JSON.parse(localStorage.getItem('cmequipo')||'null'),digitos=['','','',''],casillaActiva=0,sesionDigitos='',ultimaPista=null;const $=x=>document.getElementById(x),esc=x=>String(x??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function av(e){const a=AV[e.avatarId]||['Avatar','rayo.png','#777'];return{...e,av:a[0],img:a[1],color:a[2]}}function post(d){return fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(d)}).then(r=>r.json())}function state(s){return `<span class="state ${s.estado==='abierta'?'open':s.estado==='finalizada'?'over':''}">${s.estado==='inscripcion'?'Inscripción abierta':s.estado==='abierta'?'Juego en curso':'Juego finalizado'}</span>`}function cards(es){return `<div class="grid">${es.map(x=>{let e=av(x);return `<div class="team ${e.puesto?'winner':''}" style="--c:${e.color}"><img src="${e.img}"><b>${esc(e.nombre)}</b><small>${e.av}</small><p>Intentos: ${e.intentos}${e.puesto?` · 🏆 Puesto ${e.puesto}`:''}</p></div>`}).join('')}</div>`}
async function cargar(){try{let u=API_URL+'?accion=estado&_='+Date.now();if(local)u+='&equipoId='+encodeURIComponent(local.id);let r=await fetch(u),d=await r.json();if(d.error)throw Error(d.mensaje);data=d;pintar()}catch(e){let x=modo==='jugador'?'mreg':modo==='control'?'maccion':'pantalla';if($(x))$(x).innerHTML=`<div class="msg">${esc(e.message)}</div>`}}
function pintar(){let s=data.sesion;if(modo==='jugador'){let mine=local&&local.sid===s.id&&data.equipos.find(e=>e.equipoId===local.id);$('registro').classList.toggle('hide',!!mine||s.estado!=='inscripcion');$('panel').classList.toggle('hide',!mine);if(!mine&&s.estado!=='inscripcion'){$('registro').classList.remove('hide');$('registro').innerHTML='<h2>Inscripción cerrada</h2><p>Espera la próxima partida.</p>';return}if(!mine)return;if(sesionDigitos!==s.id){sesionDigitos=s.id;digitos=['','','',''];casillaActiva=0;ultimaPista=null}let e=av(mine),its=data.misIntentos||[];$('panel').innerHTML=`${state(s)}<h2>${esc(e.nombre)}</h2><p>Avatar: ${e.av} · Intentos: ${e.intentos}</p>${s.estado==='abierta'&&!e.puesto?`<label>Construye tu intento: cuatro dígitos diferentes</label><div id="selectorCodigo"></div><div id="pistaActual">${ultimaPista||''}</div>`:e.puesto?`<div class="hint">¡Código descubierto! Obtuviste el puesto ${e.puesto}.</div>`:s.estado==='finalizada'?'<div class="gameover"><h2>GAME OVER</h2><p>Los tres códigos fueron descifrados.</p></div>':'<div class="hint">Espera a que el juez inicie.</div>'}${its.length?`<table class="tries"><tr><th>Intento</th><th>Correctos</th><th>Misma posición</th><th>Otra posición</th></tr>${its.map(i=>`<tr><td>${i.codigo}</td><td>${i.exactos+i.desordenados}</td><td>${i.exactos}</td><td>${i.desordenados}</td></tr>`).join('')}</table>`:''}`;if(s.estado==='abierta'&&!e.puesto)renderSelector()}
if(modo==='control'){if(!control)return;$('login').classList.add('hide');$('panelControl').classList.remove('hide');$('estadoControl').innerHTML=state(s)+` · ${data.equipos.length}/10 equipos · ${s.ganadores.length}/3 ganadores`;$('equiposControl').innerHTML='<h2>Equipos</h2>'+cards(data.equipos)}if(modo==='vivo'){$('pantalla').innerHTML=s.estado==='finalizada'?`<div class="gameover"><h2>GAME OVER</h2><p>Los tres primeros equipos descifraron sus códigos.</p></div><div class="card">${cards(data.equipos)}</div>`:`<div class="card"><div class="row"><h2>Clasificación en vivo</h2>${state(s)}</div><p>Los códigos permanecen secretos.</p>${cards([...data.equipos].sort((a,b)=>(a.puesto||99)-(b.puesto||99)||b.intentos-a.intentos))}</div>`}}
async function registrar(e){e.preventDefault();try{let d=await post({accion:'registrar',nombre:$('nombre').value});if(d.error)throw Error(d.mensaje);local={sid:data.sesion.id,id:d.equipoId};localStorage.setItem('cmequipo',JSON.stringify(local));cargar()}catch(x){$('mreg').innerHTML=`<div class="msg">${esc(x.message)}</div>`}}
function renderSelector(){const z=$('selectorCodigo');if(!z)return;z.innerHTML=`<div class="casillas">${digitos.map((d,i)=>`<button class="casilla ${i===casillaActiva?'activa':''}" onclick="seleccionarCasilla(${i})">${d||'·'}</button>`).join('')}</div><div class="teclado">${[1,2,3,4,5,6,7,8,9].map(n=>`<button onclick="ponerDigito('${n}')">${n}</button>`).join('')}<button onclick="borrarDigito()" class="borrar">⌫</button><button onclick="ponerDigito('0')">0</button><button onclick="limpiarDigitos()" class="borrar">Limpiar</button></div><button class="enviar" onclick="enviarIntento()">Comprobar intento</button>`}
function seleccionarCasilla(i){casillaActiva=i;renderSelector()}function ponerDigito(n){digitos[casillaActiva]=n;if(casillaActiva<3)casillaActiva++;ultimaPista=null;renderSelector()}function borrarDigito(){if(digitos[casillaActiva])digitos[casillaActiva]='';else if(casillaActiva>0){casillaActiva--;digitos[casillaActiva]=''}ultimaPista=null;renderSelector()}function limpiarDigitos(){digitos=['','','',''];casillaActiva=0;ultimaPista=null;renderSelector()}
async function enviarIntento(){const codigo=digitos.join('');if(codigo.length!==4){$('pistaActual').innerHTML='<div class="msg">Completa las cuatro casillas.</div>';return}try{let d=await post({accion:'intentar',equipoId:local.id,codigo});if(d.error)throw Error(d.mensaje);const p=d.pista,total=p.exactos+p.desordenados;ultimaPista=`<div class="msg ok"><b>Resultado:</b> ${total} dígito(s) correcto(s) · ${p.exactos} en la misma posición · ${p.desordenados} correcto(s) en otra posición.</div>`;if(total===0){digitos=['','','',''];casillaActiva=0}cargar()}catch(x){$('pistaActual').innerHTML=`<div class="msg">${esc(x.message)}</div>`}}
async function accion(a){try{let d=await post({accion:a,clave:control});if(d.error)throw Error(d.mensaje);if(a==='reiniciar'){local=null;localStorage.removeItem('cmequipo');digitos=['','','',''];ultimaPista=null}cargar()}catch(x){$('maccion').innerHTML=`<div class="msg">${esc(x.message)}</div>`}}function abrir(){accion('abrir')}function resetear(){if(confirm('¿Reiniciar la partida?'))accion('reiniciar')}function entrarControl(e){e.preventDefault();control=$('clave').value;sessionStorage.setItem('cmcontrol',control);cargar()}
$(''+(modo==='control'?'control':modo==='vivo'?'vivo':'jugador')).classList.remove('hide');cargar();setInterval(cargar,2000);
</script></body></html>
