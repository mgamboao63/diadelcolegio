<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Código Maestro - En vivo</title><style>body{margin:0;background:#16090b;color:#fff;font-family:Arial}header{background:linear-gradient(120deg,#3b0c12,#a71932);padding:20px;border-bottom:3px solid #fbbf24}.h,main{max-width:1100px;margin:auto}.h{display:flex;justify-content:space-between;align-items:center;gap:12px}main{padding:20px}.card{background:#fff;color:#281719;padding:20px;border-radius:16px;box-shadow:0 8px 25px #0008;margin-bottom:16px}.hide{display:none!important}button,input{padding:11px;border-radius:9px;font-size:1rem}button{border:0;background:#a71932;color:#fff;font-weight:bold;cursor:pointer;transition:.15s}button:active,button.on{background:#fbbf24!important;color:#351700!important;box-shadow:0 0 0 4px #fca5a5;transform:scale(.97)}input{box-sizing:border-box;width:100%;border:1px solid #bbb;margin:7px 0}.center{max-width:500px;margin:25px auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.p{border-left:6px solid var(--c);padding:12px;border-radius:12px;background:#fff}.p img{width:45px;height:45px;object-fit:contain;float:left;margin-right:8px}.p p{clear:both;margin:8px 0 0}.msg{padding:12px;margin-top:12px;background:#fee2e2;border-radius:9px}.ok{background:#dcfce7}.state{background:#fee2e2;padding:8px;border-radius:8px;display:inline-block}.tries{width:100%;border-collapse:collapse;margin-top:14px}.tries td,.tries th{padding:8px;border-bottom:1px solid #ddd;text-align:left}.over{text-align:center;background:#2b0710;border:4px solid #fbbf24;border-radius:20px;padding:40px;color:#fff}.over h2{font-size:clamp(3rem,10vw,7rem);color:#fbbf24;margin:0}@media(max-width:500px){.h{flex-direction:column;align-items:flex-start}}</style></head><body><header><div class="h"><div><h1>♦ Código Maestro</h1><div>Descifra tu código antes que los demás.</div></div><div><button onclick="location.href='codigo-maestro-firebase.html?modo=juez'">Juez</button> <button onclick="window.open('codigo-maestro-firebase.html?modo=vivo','vivo')">Videobeam</button></div></div></header><main><section id="jugador" class="hide"><div id="reg" class="card center"><h2>Registro de equipo</h2><input id="nombre" placeholder="Nombre del equipo"><button onclick="registrar()">Entrar</button><div id="mr"></div></div><div id="panel" class="card center hide"></div></section><section id="juez" class="hide"><div id="login" class="card center"><input id="clave" type="password" placeholder="Clave del juez"><button onclick="entrarJuez()">Entrar</button></div><div id="cj" class="hide"><div class="card"><h2>Control</h2><div id="ej"></div><p><button onclick="iniciar()">Iniciar juego</button> <button onclick="reiniciar()">Reiniciar</button></p></div><div id="lista" class="card"></div></div></section><section id="vivo" class="hide"><div id="pv"></div></section></main><script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';import{getAuth,signInAnonymously}from'https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js';import{getDatabase,ref,onValue,runTransaction}from'https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js';const cfg={apiKey:'AIzaSyCnM74qIoBtYY943dChQPYEclRSvUfDu1g',authDomain:'brasilia-borderland-en-vivo.firebaseapp.com',databaseURL:'https://brasilia-borderland-en-vivo-default-rtdb.firebaseio.com',projectId:'brasilia-borderland-en-vivo',appId:'1:1015529796864:web:e89639ee956921f15e2fe5'},app=initializeApp(cfg),auth=getAuth(app),db=getDatabase(app),R=ref(db,'juegos/codigoMaestro');const A=[['Rayo','rayo.png','#f59e0b'],['Fénix','fenix.png','#ef4444'],['Tigre','tigre.png','#f97316'],['Halcón','halcon.png','#3b82f6'],['Lobo','lobo.png','#64748b'],['Jaguar','jaguar.png','#a16207'],['Cometa','cometa.png','#8b5cf6'],['Titán','titan.png','#0f766e'],['Nébula','nebula.png','#6366f1'],['Vector','vector.png','#06b6d4']],modo=new URLSearchParams(location.search).get('modo')||'jugador';let uid='',G=null,juez=false;const $=x=>document.getElementById(x);function nuevo(){return{estado:'inscripcion',players:{},tries:{},puestos:[]}}function cod(){let a=[];while(a.length<4){let n=Math.floor(Math.random()*10)+'';if(!a.includes(n))a.push(n)}return a.join('')}function pista(s,i){let e=0,d=0;for(let x=0;x<4;x++){if(s[x]===i[x])e++;else if(s.includes(i[x]))d++}return{e,d}}function st(g){return`<span class="state">${g.estado==='inscripcion'?'Inscripción abierta':g.estado==='abierta'?'Juego en curso':'Partida finalizada'}</span>`}function cards(g){return`<div class="grid">${Object.entries(g.players||{}).sort((a,b)=>(a[1].puesto||99)-(b[1].puesto||99)||b[1].intentos-a[1].intentos).map(([id,p])=>{let a=A[p.avatar]||A[0];return`<div class="p" style="--c:${a[2]}"><img src="${a[1]}"><b>${p.nombre}</b><small> ${a[0]}</small><p>Intentos: ${p.intentos||0}${p.puesto?' · 🏆 Puesto '+p.puesto:''}</p></div>`}).join('')}</div>`}async function tx(f){return runTransaction(R,x=>f(x||nuevo()))}window.registrar=async()=>{let n=$('nombre').value.trim(),r=await tx(g=>{let p=g.players||{};if(g.estado!=='inscripcion'||!n||Object.keys(p).length>=40||Object.values(p).some(x=>x.nombre.toLowerCase()===n.toLowerCase()))return;g.players={...p,[uid]:{nombre:n,avatar:Object.keys(p).length%10,secreto:cod(),intentos:0,puesto:0}};return g});if(!r.committed)$('mr').textContent='No fue posible registrar ese equipo.'};window.entrarJuez=()=>{if($('clave').value==='136101521'){juez=true;render()}else alert('Clave incorrecta')};window.iniciar=()=>tx(g=>{if(!juez||g.estado!=='inscripcion'||!Object.keys(g.players||{}).length)return;g.estado='abierta';return g});window.intentar=()=>{let i=$('codigo').value.trim();tx(g=>{let p=g.players?.[uid];if(g.estado!=='abierta'||!p||p.puesto||!/^[0-9]{4}$/.test(i)||new Set(i).size!==4)return;g.tries=g.tries||{};let z=pista(p.secreto,i);g.tries[uid]=[...(g.tries[uid]||[]),{i,e:z.e,d:z.d}];p.intentos=(p.intentos||0)+1;if(z.e===4){p.puesto=(g.puestos||[]).length+1;g.puestos=[...(g.puestos||[]),uid];if(g.puestos.length>=3)g.estado='finalizada'}return g})};window.reiniciar=()=>{if(juez&&confirm('¿Reiniciar?'))tx(()=>nuevo())};function render(){if(!G)return;let p=G.players?.[uid];if(modo==='jugador'){$('reg').classList.toggle('hide',!!p||G.estado!=='inscripcion');$('panel').classList.toggle('hide',!p);if(!p)return;let h=st(G)+`<h2>${p.nombre}</h2>`;if(G.estado==='abierta'&&!p.puesto)h+='<input id="codigo" inputmode="numeric" maxlength="4" placeholder="Cuatro dígitos distintos"><button onclick="intentar()">Probar código</button>';else if(p.puesto)h+='<div class="msg ok">🏆 Descifraste tu código. Puesto '+p.puesto+'</div>';else if(G.estado==='finalizada')h+='<div class="over"><h2>GAME OVER</h2><p>Los tres códigos fueron descifrados.</p></div>';else h+='<div class="msg">Espera al juez.</div>';let ts=G.tries?.[uid]||[];if(ts.length)h+=`<table class="tries"><tr><th>Intento</th><th>Correctos</th><th>Misma posición</th><th>Otra posición</th></tr>${ts.map(x=>`<tr><td>${x.i}</td><td>${x.e+x.d}</td><td>${x.e}</td><td>${x.d}</td></tr>`).join('')}</table>`;$('panel').innerHTML=h}if(modo==='juez'){if(!juez){$('login').classList.remove('hide');$('cj').classList.add('hide')}else{$('login').classList.add('hide');$('cj').classList.remove('hide');$('ej').innerHTML=st(G)+` · ${G.puestos?.length||0}/3 ganadores`;$('lista').innerHTML='<h2>Clasificación</h2>'+cards(G)}}if(modo==='vivo')$('pv').innerHTML=G.estado==='finalizada'?'<div class="over"><h2>GAME OVER</h2><p>Los tres primeros equipos descifraron sus códigos.</p></div><div class="card">'+cards(G)+'</div>':'<div class="card"><h2>Clasificación en vivo</h2>'+st(G)+cards(G)+'</div>'}await signInAnonymously(auth);uid=auth.currentUser.uid;$(''+(modo==='juez'?'juez':modo==='vivo'?'vivo':'jugador')).classList.remove('hide');onValue(R,s=>{G=s.val()||nuevo();render()});
</script></body></html>
