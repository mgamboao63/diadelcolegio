<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Juego del 80% - En vivo</title><style>body{margin:0;background:#edf5ff;color:#102b4e;font-family:Arial}header{background:linear-gradient(120deg,#102b4e,#1767a6);color:#fff;padding:20px}.h,main{max-width:1100px;margin:auto}.h{display:flex;justify-content:space-between;gap:12px;align-items:center}main{padding:20px}.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 7px 22px #123a6020;margin-bottom:16px}.hide{display:none!important}button,input{padding:11px;border-radius:9px;font-size:1rem}button{border:0;background:#1767a6;color:#fff;font-weight:bold;cursor:pointer;transition:.15s}button:active,button.on{background:#f4b942!important;color:#312100!important;box-shadow:0 0 0 4px #bde1ff;transform:scale(.97)}input{box-sizing:border-box;width:100%;border:1px solid #bbb;margin:7px 0}.center{max-width:500px;margin:25px auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.p{border-left:6px solid var(--c);padding:12px;border-radius:12px;background:#fff}.p img{width:45px;height:45px;object-fit:contain;float:left;margin-right:8px}.p p{clear:both;margin:8px 0 0}.nums{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.nums button{font-size:1.15rem}.msg{margin-top:12px;padding:12px;border-radius:9px;background:#dbeafe}.ok{background:#dcfce7}.state{background:#dbeafe;padding:8px;border-radius:8px;display:inline-block}.big{text-align:center;font-size:2rem;color:#a06100}@media(max-width:500px){.h{flex-direction:column;align-items:flex-start}.nums{grid-template-columns:repeat(5,1fr)}}</style></head><body><header><div class="h"><div><h1>♦ Juego del 80%</h1><div>Tiempo real · seis rondas</div></div><div><button onclick="location.href='juego-80-firebase.html?modo=juez'">Juez</button> <button onclick="window.open('juego-80-firebase.html?modo=vivo','vivo')">Videobeam</button></div></div></header><main><section id="jugador" class="hide"><div id="reg" class="card center"><h2>Registro</h2><input id="nombre" placeholder="Nickname"><button onclick="registrar()">Entrar</button><div id="mr"></div></div><div id="panel" class="card center hide"></div></section><section id="juez" class="hide"><div id="login" class="card center"><input id="clave" type="password" placeholder="Clave del juez"><button onclick="entrarJuez()">Entrar</button></div><div id="cj" class="hide"><div class="card"><h2>Control</h2><div id="ej"></div><p><button onclick="abrir()">Abrir ronda</button> <button onclick="cerrar()">Cerrar y calificar</button> <button onclick="reiniciar()">Reiniciar</button></p><div id="mj"></div></div><div class="card" id="lista"></div></div></section><section id="vivo" class="hide"><div id="pv"></div></section></main><script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';import{getAuth,signInAnonymously}from'https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js';import{getDatabase,ref,onValue,runTransaction}from'https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js';
const cfg={apiKey:'AIzaSyCnM74qIoBtYY943dChQPYEclRSvUfDu1g',authDomain:'brasilia-borderland-en-vivo.firebaseapp.com',databaseURL:'https://brasilia-borderland-en-vivo-default-rtdb.firebaseio.com',projectId:'brasilia-borderland-en-vivo',appId:'1:1015529796864:web:e89639ee956921f15e2fe5'},app=initializeApp(cfg),auth=getAuth(app),db=getDatabase(app),R=ref(db,'juegos/juego80');const A=[['Rayo','rayo.png','#f59e0b'],['Fénix','fenix.png','#ef4444'],['Tigre','tigre.png','#f97316'],['Halcón','halcon.png','#3b82f6'],['Lobo','lobo.png','#64748b'],['Jaguar','jaguar.png','#a16207'],['Cometa','cometa.png','#8b5cf6'],['Titán','titan.png','#0f766e'],['Nébula','nebula.png','#6366f1'],['Vector','vector.png','#06b6d4']];const modo=new URLSearchParams(location.search).get('modo')||'jugador';let uid='',G=null,juez=false;const $=x=>document.getElementById(x);function nuevo(){return{estado:'inscripcion',ronda:0,objetivo:null,players:{},answers:{}}}function activos(g){return Object.values(g.players||{})}function st(g){return `<span class="state">${g.estado==='inscripcion'?'Inscripción abierta':g.estado==='abierta'?'Ronda '+g.ronda+' abierta':g.estado==='cerrada'?'Ronda '+g.ronda+' calificada':'Partida finalizada'}</span>`}function cards(g){return`<div class="grid">${Object.entries(g.players||{}).sort((a,b)=>b[1].wins-a[1].wins).map(([id,p])=>{let a=A[p.avatar]||A[0],r=g.answers?.[id];return`<div class="p" style="--c:${a[2]}"><img src="${a[1]}"><b>${p.nombre}</b><small> ${a[0]}</small><p>Victorias: ${p.wins||0}${g.estado==='cerrada'&&r?' · Número: '+r.n+(r.win?' 🏆':''):''}</p></div>`}).join('')}</div>`}async function tx(f){return runTransaction(R,x=>f(x||nuevo()))}window.registrar=async()=>{let n=$('nombre').value.trim(),r=await tx(g=>{let p=g.players||{};if(g.estado!=='inscripcion'||!n||Object.keys(p).length>=40||Object.values(p).some(x=>x.nombre.toLowerCase()===n.toLowerCase()))return;g.players={...p,[uid]:{nombre:n,avatar:Object.keys(p).length%10,wins:0}};return g});if(!r.committed)$('mr').textContent='No fue posible registrar ese nombre.'};window.entrarJuez=()=>{if($('clave').value==='136101521'){juez=true;render()}else alert('Clave incorrecta')};window.abrir=()=>tx(g=>{if(!juez||g.estado==='abierta'||g.ronda>=6||!activos(g).length)return;g.ronda++;g.estado='abierta';g.answers={};g.objetivo=null;return g});window.enviar=n=>tx(g=>{g.answers=g.answers||{};if(g.estado!=='abierta'||g.answers[uid]||!g.players[uid])return;g.answers[uid]={n};return g});window.cerrar=()=>tx(g=>{if(!juez||g.estado!=='abierta'||Object.keys(g.answers||{}).length!==activos(g).length)return;let as=Object.entries(g.answers),prom=as.reduce((s,[,v])=>s+v.n,0)/as.length,obj=prom*.8,d=Math.min(...as.map(([,v])=>Math.abs(v.n-obj)));as.forEach(([id,v])=>{v.win=Math.abs(v.n-obj)===d;if(v.win)g.players[id].wins++});g.objetivo=obj;g.estado=g.ronda>=6?'finalizada':'cerrada';return g});window.reiniciar=()=>{if(juez&&confirm('¿Reiniciar?'))tx(()=>nuevo())};function render(){if(!G)return;let p=G.players?.[uid];if(modo==='jugador'){$('reg').classList.toggle('hide',!!p||G.estado!=='inscripcion');$('panel').classList.toggle('hide',!p);if(!p)return;let h=st(G)+`<h2>${p.nombre}</h2>`;if(G.estado==='abierta'&&!G.answers?.[uid])h+='<h3>Elige un número entre 0 y 20</h3><div class="nums">'+Array.from({length:21},(_,i)=>`<button onclick="enviar(${i})">${i}</button>`).join('')+'</div>';else if(G.estado==='abierta')h+='<div class="msg ok">✓ Número enviado. Espera al juez.</div>';else if(G.estado==='cerrada'||G.estado==='finalizada'){let r=G.answers?.[uid];h+=`<div class="big">80% del promedio: ${Number(G.objetivo).toFixed(2)}</div><div class="msg ${r?.win?'ok':''}">${r?.win?'🏆 Ganaste esta ronda':'Tu número fue '+(r?.n??'-')}</div>`}else h+='<div class="msg">Espera a que el juez abra la ronda.</div>';$('panel').innerHTML=h}if(modo==='juez'){if(!juez){$('login').classList.remove('hide');$('cj').classList.add('hide')}else{$('login').classList.add('hide');$('cj').classList.remove('hide');$('ej').innerHTML=st(G)+` · ${Object.keys(G.answers||{}).length}/${activos(G).length} respuestas`;$('lista').innerHTML='<h2>Clasificación</h2>'+cards(G)}}if(modo==='vivo')$('pv').innerHTML='<div class="card"><h2>Clasificación en vivo</h2>'+st(G)+`<h3>Ronda ${G.ronda}/6</h3>`+cards(G)+'</div>'}await signInAnonymously(auth);uid=auth.currentUser.uid;$(''+(modo==='juez'?'juez':modo==='vivo'?'vivo':'jugador')).classList.remove('hide');onValue(R,s=>{G=s.val()||nuevo();render()});
document.head.insertAdjacentHTML('beforeend',`<style>button{transition:transform .14s,box-shadow .14s,background .14s}button.presionado{background:#f4b942!important;color:#312100!important;box-shadow:inset 0 3px 7px #7a5100,0 0 0 4px #bde1ff;transform:translateY(2px) scale(.98)}.espera80{text-align:center;margin-top:28px;color:#0e5590;font-weight:bold}.espera80 img{width:150px;height:150px;object-fit:contain;display:block;margin:0 auto 8px;animation:rebote80 .7s infinite alternate}.puntos80:after{content:'...';animation:puntos80 1.2s infinite}@keyframes rebote80{from{transform:translateY(0) rotate(-4deg)}to{transform:translateY(-12px) rotate(4deg)}}@keyframes puntos80{0%,100%{opacity:.2}50%{opacity:1}}</style>`);
document.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;b.classList.add('presionado');setTimeout(()=>b.classList.remove('presionado'),1200)});
const renderBase80=render;render=function(){renderBase80();if(modo!=='jugador'||!G||!uid)return;const p=G.players?.[uid],panel=document.getElementById('panel');if(!p||!panel)return;const espera=(G.estado==='abierta'&&G.answers?.[uid])||G.estado==='cerrada';if(espera){const a=A[p.avatar]||A[0];panel.insertAdjacentHTML('beforeend',`<div class="espera80"><img src="${a[1]}" alt="Esperando"><div>Esperando al juez<span class="puntos80"></span></div></div>`)}};
</script></body></html>
