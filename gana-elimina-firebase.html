<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gana y elimina</title><style>
:root{--v:#6524aa;--p:#e53585;--ink:#28123d}*{box-sizing:border-box}body{margin:0;font-family:Arial;background:#fff4fa;color:var(--ink)}header{padding:20px;background:linear-gradient(110deg,#32145c,var(--p));color:#fff}.head,main{max-width:1100px;margin:auto}.head{display:flex;justify-content:space-between;align-items:center;gap:10px}.head h1{margin:0}.head p{margin:5px 0}.card{background:#fff;padding:20px;border-radius:19px;box-shadow:0 9px 25px #55206620;margin:16px 0}.center{max-width:600px;margin:30px auto}.hide{display:none!important}button,input{font:inherit;padding:12px;border-radius:10px}button{border:0;background:var(--v);color:#fff;font-weight:bold;cursor:pointer;transition:.15s}button:active,button.selected{transform:scale(.97);background:#f6bf35!important;color:#402600!important;box-shadow:0 0 0 4px #ffdea0}button:disabled{opacity:.45;cursor:not-allowed}input{width:100%;border:1px solid #cdb7d8;margin:8px 0}.row,.top{display:flex;gap:9px;flex-wrap:wrap;align-items:center}.top{justify-content:space-between}.badge{padding:8px 12px;border-radius:99px;background:#f0dcff;color:#57128e;font-weight:bold}.timer{font-size:1.5rem;font-weight:bold;color:#af1059}.q{font-size:1.55rem;text-align:center;margin:25px auto;max-width:800px}.choices,.players{display:grid;gap:12px}.choices{grid-template-columns:repeat(2,minmax(0,1fr));max-width:760px;margin:auto}.choice{background:#f6e9fd;color:#4c156e;border:2px solid #d3abe9;min-height:76px}.notice{background:#f2e4ff;padding:14px;border-radius:12px;margin-top:14px}.good{background:#dcf9e7;color:#075b31}.bad{background:#ffe1e9;color:#94123b}.players{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}.player{border-left:7px solid #8b5cf6;padding:12px;background:#fff;border-radius:13px}.player.protected{border-color:#159653;background:#eafff1}.player.out{opacity:.48;border-color:#999;text-decoration:line-through}.player b{display:block}.player small{color:#715781}.eliminate{display:block;width:100%;background:#a90e47;margin-top:9px}.sort{max-width:650px;margin:auto}.sort button{display:block;width:100%;text-align:left;margin:7px 0;background:#f1e3fb;color:#4d176e;border:2px dashed #b88bd6}.dragging{opacity:.3}.grid9{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:400px;margin:auto}.grid9 button{height:70px;font-size:1.25rem}.answer{max-width:430px;margin:auto;text-align:center}.winner{text-align:center;color:#a11059;font-size:2rem;font-weight:bold}@media(max-width:550px){.head{align-items:flex-start;flex-direction:column}.choices{grid-template-columns:1fr}.q{font-size:1.3rem}}
</style></head><body><header><div class="head"><div><h1>⚔ Gana y elimina</h1><p>Responde rápido. Gana el poder. Sobrevive.</p></div><div class="row"><button onclick="location.href='gana-elimina-firebase.html?modo=juez'">Juez</button><button onclick="window.open('gana-elimina-firebase.html?modo=vivo','videobeam')">Videobeam</button></div></div></header><main><section id="jugador" class="hide"><div id="registro" class="card center"><h2>Registro</h2><p>Hasta 40 concursantes por grupo.</p><input id="nombre" maxlength="20" placeholder="Tu nickname"><button onclick="registrar()">Entrar a la arena</button><div id="mr"></div></div><div id="pj" class="hide"></div></section><section id="juez" class="hide"><div id="login" class="card center"><h2>Control del juez</h2><input id="clave" type="password" placeholder="Contraseña"><button onclick="entrarJuez()">Ingresar</button></div><div id="cj" class="hide"></div></section><section id="vivo" class="hide"><div id="pv"></div></section></main>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';import{getAuth,signInAnonymously}from'https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js';import{getDatabase,ref,onValue,runTransaction}from'https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js';
const cfg={apiKey:'AIzaSyCnM74qIoBtYY943dChQPYEclRSvUfDu1g',authDomain:'brasilia-borderland-en-vivo.firebaseapp.com',databaseURL:'https://brasilia-borderland-en-vivo-default-rtdb.firebaseio.com',projectId:'brasilia-borderland-en-vivo',appId:'1:1015529796864:web:e89639ee956921f15e2fe5'},app=initializeApp(cfg),auth=getAuth(app),db=getDatabase(app),R=ref(db,'juegos/ganaElimina');
const Q=[['c','¿Cuál número es mayor?',['48','84','64','46'],'84'],['c','¿Qué planeta es conocido como el planeta rojo?',['Venus','Marte','Júpiter','Saturno'],'Marte'],['c','¿Qué animal respira por branquias?',['Perro','Pez','Gallina','Caballo'],'Pez'],['c','¿Qué órgano bombea la sangre?',['Pulmón','Estómago','Corazón','Riñón'],'Corazón'],['c','¿Qué figura tiene cuatro lados iguales?',['Cuadrado','Triángulo','Círculo','Pentágono'],'Cuadrado'],['c','Si una flecha apunta ↑ y rota media vuelta, queda hacia:',['abajo','arriba','derecha','izquierda'],'abajo'],['c','¿Qué sucede al mezclar rojo y azul?',['Verde','Morado','Amarillo','Blanco'],'Morado'],['c','¿Cuál objeto no pertenece al grupo?',['Manzana','Pera','Banano','Zapato'],'Zapato'],['n','¿Cuánto es 7 × 8?',null,'56'],['n','Si pagas $5.000 por algo de $3.000, ¿cuánto recibes?',null,'2000'],['t','Escribe la capital de Colombia.',null,'bogotá'],['t','¿Qué estado del agua es el hielo?',null,'sólido'],['s','Arrastra y ordena de mayor a menor.',['9','21','14','3'],'21|14|9|3'],['s','Arrastra la cadena alimenticia correcta.',['Serpiente come rana y rana come mosca','Mosca come rana y rana come serpiente','Rana come serpiente y serpiente come mosca','Mosca come serpiente y serpiente come rana'],'Serpiente come rana y rana come mosca'],['g','Estás en (2,3) y te mueves 2 a la derecha. Elige la nueva posición.',null,'4,3']];
let uid='',G,juez=false,last='',drag;const $=x=>document.getElementById(x),N=s=>String(s||'').trim().toLocaleLowerCase('es').normalize('NFD').replace(/[\u0300-\u036f]/g,'');const nuevo=()=>({estado:'inscripcion',players:{},historial:[],respuestas:{},proteccion:{},pregunta:null,deadline:0,mensaje:''});const vivos=(g=G)=>Object.entries(g?.players||{}).filter(([,p])=>!p.eliminado);const q=()=>Q[G?.pregunta?.id];const segundos=()=>Math.max(0,Math.ceil(((G?.deadline||0)-Date.now())/1000));
document.addEventListener('click',e=>{let b=e.target.closest('button');if(b){b.classList.add('selected');setTimeout(()=>b.classList.remove('selected'),900)}});async function tx(f){return runTransaction(R,x=>f(x||nuevo()))}
window.registrar=async()=>{let n=$('nombre').value.trim(),r=await tx(g=>{if(g.estado!=='inscripcion'||!n||g.players?.[uid]||Object.keys(g.players||{}).length>=40||Object.values(g.players||{}).some(p=>N(p.nombre)===N(n)))return;g.players={...(g.players||{}),[uid]:{nombre:n,eliminado:false}};return g});if(!r.committed)$('mr').innerHTML='<div class="notice bad">No fue posible registrar ese nombre.</div>'};window.entrarJuez=()=>{if($('clave').value==='136101521'){juez=true;render()}else alert('Contraseña incorrecta')};
window.iniciar=()=>tx(g=>{if(!juez||g.estado!=='inscripcion'||vivos(g).length<2)return;let pool=Q.map((_,i)=>i).filter(i=>!(g.historial||[]).includes(i));if(!pool.length){g.historial=[];pool=Q.map((_,i)=>i)}let id=pool[Math.floor(Math.random()*pool.length)];g.historial=[...(g.historial||[]),id];g.pregunta={id};g.respuestas={};g.proteccion={};g.selector=null;g.estado='abierta';g.deadline=Date.now()+20000;return g});
window.responder=v=>tx(g=>{let z=Q[g.pregunta?.id];if(g.estado!=='abierta'||!z||g.respuestas?.[uid]||g.players?.[uid]?.eliminado||Date.now()>g.deadline)return;g.respuestas={...(g.respuestas||{}),[uid]:{ok:N(v)===N(z[3]),tiempo:Date.now()}};return g});
function resolver(g){let c=Object.entries(g.respuestas||{}).filter(([,r])=>r.ok).sort((a,b)=>a[1].tiempo-b[1].tiempo);if(!c.length){Object.values(g.players||{}).forEach(p=>p.eliminado=true);g.estado='grupo_finalizado';g.mensaje='Nadie acertó.';return}g.selector=c[0][0];g.proteccion=Object.fromEntries((vivos(g).length>3?c.slice(1,3):[]).map(([id])=>[id,true]));g.estado='eligiendo';g.deadline=Date.now()+20000};window.cerrar=()=>tx(g=>{if(juez&&g.estado==='abierta')resolver(g);return g});
function elimina(g,id){g.players[id].eliminado=true;if(vivos(g).length===1){g.estado='finalizada';g.deadline=0}else{g.estado='inscripcion';g.deadline=0;g.pregunta=null;g.respuestas={};g.proteccion={};g.selector=null}}window.eliminar=id=>tx(g=>{if(g.estado==='eligiendo'&&g.selector===uid&&id!==uid&&!g.proteccion?.[id]&&!g.players?.[id]?.eliminado)elimina(g,id);return g});window.azar=()=>tx(g=>{if(!juez||g.estado!=='eligiendo')return;let a=vivos(g).map(([id])=>id).filter(id=>id!==g.selector&&!g.proteccion?.[id]);if(a.length)elimina(g,a[Math.floor(Math.random()*a.length)]);return g});window.nuevoGrupo=()=>{if(juez&&confirm('¿Borrar este grupo?'))tx(g=>{let n=nuevo();n.historial=g.historial||[];return n})};
function cartel(){let names=Object.entries(G.players||{});return '<div class="players">'+names.map(([id,p])=>`<div class="player ${p.eliminado?'out':''} ${G.proteccion?.[id]?'protected':''}"><b>${p.nombre}</b><small>${p.eliminado?'ELIMINADO':G.proteccion?.[id]?'🛡 Protegido':G.respuestas?.[id]?'✓ Respondió':'En juego'}</small>${G.estado==='eligiendo'&&G.selector===uid&&!p.eliminado&&!G.proteccion?.[id]&&id!==uid?`<button class="eliminate" onclick="eliminar('${id}')">Eliminar</button>`:''}</div>`).join('')+'</div>'}
function pregunta(can){let z=q();if(!z)return'';if(z[0]==='c')return '<div class="choices">'+z[2].map(x=>`<button class="choice" ${can?`onclick="responder(this.dataset.v)" data-v="${x}"`:'disabled'}>${x}</button>`).join('')+'</div>';if(z[0]==='n'||z[0]==='t')return `<div class="answer"><input id="libre" ${z[0]==='n'?'inputmode="numeric"':''} placeholder="Escribe tu respuesta"><button ${can?'':'disabled'} onclick="responder(document.getElementById('libre').value)">Enviar respuesta</button></div>`;if(z[0]==='s')return `<div class="sort" id="orden">${z[2].map(x=>`<button draggable="true" data-v="${x}">↕ ${x}</button>`).join('')}</div><div class="answer"><button ${can?'':'disabled'} onclick="responder([...document.querySelectorAll('#orden button')].map(x=>x.dataset.v).join('|'))">Confirmar orden</button></div>`;return `<div class="grid9">${['2,3','3,3','4,3','2,2','3,2','4,2','2,1','3,1','4,1'].map(x=>`<button ${can?`onclick="responder('${x}')"`:'disabled'}>${x}</button>`).join('')}</div>`}
function dragSetup(){document.querySelectorAll('#orden button').forEach(x=>{x.ondragstart=()=>{drag=x;x.classList.add('dragging')};x.ondragend=()=>x.classList.remove('dragging');x.ondragover=e=>e.preventDefault();x.ondrop=e=>{e.preventDefault();if(drag&&drag!==x)x.parentNode.insertBefore(drag,x)}})}
function estado(){return({inscripcion:'Espera al juez',abierta:'Ronda abierta',eligiendo:'Eliminación',finalizada:'Ganador',grupo_finalizado:'Grupo eliminado'})[G.estado]}
function jugador(){let p=G.players?.[uid],b=$('pj');$('registro').classList.toggle('hide',!!p||G.estado!=='inscripcion');b.classList.toggle('hide',!p);if(!p)return;let h='<div class="card center">';if(p.eliminado)h+='<h2>Has quedado eliminado</h2><div class="notice bad">Espera al siguiente grupo.</div>';else if(G.estado==='abierta')h+=`<div class="top"><span class="badge">⚔ Responde rápido</span><span class="timer">⏱ ${segundos()} s</span></div><div class="q">${q()[1]}</div>${G.respuestas?.[uid]?'<div class="notice good">✓ Respuesta enviada.</div>':pregunta(true)}`;else if(G.estado==='eligiendo')h+=G.selector===uid?`<div class="top"><span class="badge">¡Tienes el poder!</span><span class="timer">⏱ ${segundos()} s</span></div><div class="q">Elige a quién eliminar</div>${cartel()}`:`<h2>${G.players?.[G.selector]?.nombre||'El ganador'} está eligiendo</h2><div class="notice">Los tres más rápidos correctos están protegidos mientras haya más de tres participantes.</div>${cartel()}`;else if(G.estado==='finalizada')h+=`<div class="winner">🏆 ${Object.values(G.players||{}).find(x=>!x.eliminado)?.nombre||''} gana</div>`;else if(G.estado==='grupo_finalizado')h+='<div class="winner">GAME OVER</div><div class="notice bad">Nadie acertó: este grupo queda eliminado.</div>';else h+=`<h2>${G.mensaje||'Espera al juez.'}</h2>${cartel()}`;b.innerHTML=h+'</div>';dragSetup()}
function control(){let b=$('cj');if(!juez){$('login').classList.remove('hide');b.classList.add('hide');return}$('login').classList.add('hide');b.classList.remove('hide');let h=`<div class="card"><div class="top"><h2>Control del juez</h2><span class="badge">${estado()}</span>${G.deadline?`<span class="timer">⏱ ${segundos()} s</span>`:''}</div>`;if(G.estado==='inscripcion')h+=`<p>${vivos().length}/40 participantes activos.</p><button ${vivos().length<2?'disabled':''} onclick="iniciar()">Iniciar ronda</button> <button onclick="nuevoGrupo()">Nuevo grupo</button>`;if(G.estado==='abierta')h+=`<div class="q">${q()[1]}</div><p>${Object.keys(G.respuestas||{}).length}/${vivos().length} respuestas.</p><button onclick="cerrar()">Cerrar y evaluar</button>`;if(G.estado==='eligiendo')h+=`<p><b>${G.players?.[G.selector]?.nombre}</b> decide. Al terminar el tiempo se elimina alguien al azar.</p><button onclick="azar()">Eliminar al azar ahora</button>`;if(G.estado==='finalizada'||G.estado==='grupo_finalizado')h+='<button onclick="nuevoGrupo()">Registrar nuevo grupo</button>';b.innerHTML=h+'</div><div class="card"><h2>Participantes</h2>'+cartel()+'</div>'}
function vivo(){let h=`<div class="card"><div class="top"><span class="badge">${estado()}</span>${G.deadline?`<span class="timer">⏱ ${segundos()} s</span>`:''}</div>`;if(G.estado==='abierta')h+=`<div class="q">${q()[1]}</div>`;if(G.estado==='eligiendo')h+='<div class="q">¡El ganador elige a quién eliminar!</div>';if(G.estado==='finalizada')h+=`<div class="winner">🏆 ${Object.values(G.players||{}).find(x=>!x.eliminado)?.nombre||''} GANA</div>`;if(G.estado==='grupo_finalizado')h+='<div class="winner">GAME OVER</div>';h+=cartel()+'</div>';$('pv').innerHTML=h}
function reloj(){let k=G?.estado+'-'+G?.deadline;if(!G?.deadline||k===last)return;last=k;setTimeout(()=>{if(Date.now()<G.deadline)return;if(juez&&G.estado==='abierta')cerrar();if(juez&&G.estado==='eligiendo')azar()},Math.max(0,G.deadline-Date.now()+100))}function render(){if(!G)return;if(modo==='jugador')jugador();if(modo==='juez')control();if(modo==='vivo')vivo();reloj()}
const modo=new URLSearchParams(location.search).get('modo')||'jugador';await signInAnonymously(auth);uid=auth.currentUser.uid;$(modo==='juez'?'juez':modo==='vivo'?'vivo':'jugador').classList.remove('hide');onValue(R,s=>{G=s.val()||nuevo();render()});
</script></body></html>
