<script type="module">

const cfg={apiKey:'AIzaSyCnM74qIoBtYY943dChQPYEclRSvUfDu1g',authDomain:'brasilia-borderland-en-vivo.firebaseapp.com',databaseURL:'https://brasilia-borderland-en-vivo-default-rtdb.firebaseio.com',projectId:'brasilia-borderland-en-vivo',appId:'1:1015529796864:web:e89639ee956921f15e2fe5'};const app=initializeApp(cfg),auth=getAuth(app),db=getDatabase(app),R=ref(db,'juegos/cuatroFiguras');const modo=new URLSearchParams(location.search).get('modo')||'jugador';let uid='',G=null,juez=false,respVisto='';const $=x=>document.getElementById(x),A=[['Rayo','rayo.png','#f59e0b'],['Fénix','fenix.png','#ef4444'],['Tigre','tigre.png','#f97316'],['Halcón','halcon.png','#3b82f6'],['Lobo','lobo.png','#64748b'],['Jaguar','jaguar.png','#a16207'],['Cometa','cometa.png','#8b5cf6'],['Titán','titan.png','#0f766e'],['Nébula','nebula.png','#6366f1'],['Vector','vector.png','#06b6d4']],F=['Corazones','Tréboles','Diamantes','Picas'];
function nuevo(){return{estado:'inscripcion',ronda:0,resultado:'',players:{},cards:{},requests:{}}}function fig(n){return F[Math.floor((n-1)/13)]}function activos(g){return Object.values(g.players||{}).filter(p=>p.activo)}function cartas(g){return Object.values(g.cards||{})}function estado(g){return `<span class="state">${g.estado==='inscripcion'?'Inscripción abierta':g.estado==='cartas'?'Ronda '+g.ronda+': registren carta':g.estado==='respuestas'?'Ronda '+g.ronda+': elijan figura':'Final: '+g.resultado}</span>`}function cards(g){return `<div class="grid">${Object.entries(g.players||{}).map(([id,p])=>{let a=A[p.avatar]||A[0];return`<div class="player ${p.activo?'':'off'}" style="--c:${a[2]}"><img src="${a[1]}"><b>${p.nombre}</b><small> ${a[0]}</small><p>${p.activo?'🃏 '+p.jokers+' comodines':'Eliminado'}</p></div>`}).join('')}</div>`}
async function tx(fn){return runTransaction(R,x=>fn(x||nuevo()))}window.registrar=async()=>{let n=$('nombre').value.trim();let r=await tx(g=>{if(g.estado!=='inscripcion')return;let p=g.players||{};if(!n||Object.keys(p).length>=40||Object.values(p).some(x=>x.nombre.toLowerCase()===n.toLowerCase()))return;g.players={...p,[uid]:{nombre:n,avatar:Object.keys(p).length%10,jokers:3,activo:true}};return g});if(!r.committed)$('mr').textContent='No se pudo registrar ese nombre.'};window.entrarJuez=()=>{if($('clave').value==='136101521'){juez=true;render()}else alert('Clave incorrecta')};window.iniciar=()=>tx(g=>{if(!juez||g.estado==='final'||!activos(g).length)return;g.ronda++;g.estado='cartas';g.cards={};g.requests={};return g});window.registrarCarta=()=>{let n=+$('carta').value;tx(g=>{if(g.estado!=='cartas'||!Number.isInteger(n)||n<1||n>52||!g.players[uid]?.activo||g.cards[uid]||cartas(g).some(x=>x.n===n))return;g.cards={...g.cards,[uid]:{n,fig:fig(n),answer:''}};if(Object.keys(g.cards).length===activos(g).length)g.estado='respuestas';return g})};window.elegir=f=>tx(g=>{if(g.estado!=='respuestas'||!g.cards[uid]||g.cards[uid].answer)return;g.cards[uid].answer=f;return g});window.comodin=()=>{let target=$('objetivo').value;tx(g=>{let p=g.players[uid];if(g.estado!=='respuestas'||!p||p.jokers<1||!target||target===uid||!g.players[target]?.activo)return;p.jokers--;g.requests={...(g.requests||{}),[uid]:{target,status:'pendiente',response:''}};return g})};window.responder=(m)=>{if(m==='falso'){let s=prompt('Escribe una figura falsa: Corazones, Tréboles, Diamantes o Picas');if(!F.includes(s))return;m='falso:'+s}tx(g=>{let r=Object.entries(g.requests||{}).find(([a,x])=>x.target===uid&&x.status==='pendiente');if(!r)return;let[a,x]=r,real=g.cards[a]?.fig;if(m==='verdad')x.response=real;else if(m==='nose')x.response='No está seguro';else{let f=m.split(':')[1];if(f===real)return;x.response=f}x.status='respondida';return g})};window.revelar=()=>tx(g=>{if(!juez||g.estado!=='respuestas'||cartas(g).some(x=>!x.answer))return;let live=[];for(const[id,p]of Object.entries(g.players)){if(!p.activo)continue;if(g.cards[id]?.fig===g.cards[id]?.answer)live.push(id);else p.activo=false}if(!live.length){g.estado='final';g.resultado='No hubo ganador'}else if(live.length===1){g.estado='final';g.resultado='Ganó '+g.players[live[0]].nombre}else{g.estado='cartas';g.ronda++;g.cards={};g.requests={}}return g});window.reiniciar=()=>{if(juez&&confirm('¿Reiniciar partida?'))tx(()=>nuevo())};
function render(){if(!G)return;let p=G.players?.[uid];if(modo==='jugador'){$('reg').classList.toggle('hide',!!p||G.estado!=='inscripcion');$('panel').classList.toggle('hide',!p);if(!p)return;let h=estado(G)+`<h2>${p.nombre}</h2><p>🃏 ${p.jokers} comodines</p>`;if(G.estado==='cartas'&&p.activo&&!G.cards?.[uid])h+='<input id="carta" type="number" min="1" max="52" placeholder="Número de tu carta"><button onclick="registrarCarta()">Registrar carta</button>';else if(G.estado==='respuestas'&&p.activo){let rq=Object.entries(G.requests||{}).find(([a,x])=>x.target===uid&&x.status==='pendiente');let own=G.requests?.[uid];if(rq)h+=`<div class="modal"><b>Te consultan la carta de un compañero.</b><p>La figura real es: <strong>${G.cards[rq[0]]?.fig}</strong></p><button onclick="responder('verdad')">Decir verdad</button> <button onclick="responder('falso')">Engañar</button> <button onclick="responder('nose')">No decir nada</button></div>`;if(own?.status==='respondida'&&respVisto!==own.response){respVisto=own.response;h+=`<div class="msg ok">Respuesta: <b>${own.response}</b></div>`;setTimeout(()=>{respVisto='oculto';render()},3000)}if(!G.cards?.[uid]?.answer)h+=`<h3>¿Cuál crees que es tu carta?</h3><div class="fig">${[['♥','Corazones'],['♣','Tréboles'],['♦','Diamantes'],['♠','Picas']].map(x=>`<button onclick="elegir('${x[1]}')">${x[0]}</button>`).join('')}</div>${p.jokers?`<h3>Usar comodín</h3><select id="objetivo"><option value="">Elige compañero</option>${Object.entries(G.players).filter(([id,x])=>id!==uid&&x.activo).map(([id,x])=>`<option value="${id}">${x.nombre}</option>`).join('')}</select><button onclick="comodin()">Consultar</button>`:''}`;else h+='<div class="msg">Respuesta enviada.</div>'}else if(!p.activo)h+='<div class="big">ELIMINADO</div>';else if(G.estado==='final')h+='<div class="big">'+G.resultado+'</div>';else h+='<div class="msg">Espera al juez.</div>';$('panel').innerHTML=h}if(modo==='juez'){if(!juez){$('login').classList.remove('hide');$('cj').classList.add('hide')}else{$('login').classList.add('hide');$('cj').classList.remove('hide');$('estadoJ').innerHTML=estado(G);$('listaJ').innerHTML='<h2>Participantes</h2>'+cards(G)}}if(modo==='vivo')$('pv').innerHTML='<div class="card"><h2>Las Cuatro Figuras</h2>'+estado(G)+cards(G)+'</div>'}
window.registrarCarta=async()=>{let n=+(document.getElementById('carta')||{}).value;const r=await tx(g=>{g.cards=g.cards||{};g.players=g.players||{};if(g.estado!=='cartas'||!Number.isInteger(n)||n<1||n>52||!g.players[uid]?.activo||g.cards[uid]||Object.values(g.cards).some(x=>x.n===n))return;g.cards[uid]={n,fig:fig(n),answer:''};if(Object.keys(g.cards).length===activos(g).length)g.estado='respuestas';return g});if(!r.committed)alert('No fue posible registrar la carta. Verifica que sea un número único entre 1 y 52.')};
await signInAnonymously(auth);uid=auth.currentUser.uid;$(''+(modo==='juez'?'juez':modo==='vivo'?'vivo':'jugador')).classList.remove('hide');

let claveRespuesta='';const renderOriginal=render;render=function(){renderOriginal();if(modo!=='jugador'||!G||!uid)return;const p=G.players?.[uid],panel=document.getElementById('panel');if(!p||!panel)return;const espera=(G.estado==='cartas'&&G.cards?.[uid])||(G.estado==='respuestas'&&G.cards?.[uid]?.answer);if(espera){const a=A[p.avatar]||A[0];panel.insertAdjacentHTML('beforeend',`<div class="espera-viva"><img src="${a[1]}" alt="Esperando"><div>Esperando al juez<span class="puntos"></span></div></div>`)}const r=G.requests?.[uid];if(r?.status==='respondida'){const k=G.ronda+'-'+r.response;if(k!==claveRespuesta){claveRespuesta=k;const esNo=r.response==='No está seguro';const simbolo={Corazones:'♥',Tréboles:'♣',Diamantes:'♦',Picas:'♠'}[r.response]||'❔';const frase=esNo?'Tu compañero dice que no está seguro.':'Tu compañero dice que tu carta es:';const o=document.createElement('div');o.className='overlay-respuesta';o.innerHTML=`<div class="dato"><h2>${frase}</h2><div class="figura">${simbolo}</div><h2>${esNo?'Piensa bien tu respuesta':r.response}</h2></div>`;document.body.appendChild(o);setTimeout(()=>o.remove(),3000)}}};
onValue(R,s=>{G=s.val()||nuevo();render()});
